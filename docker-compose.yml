services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kbagent
      POSTGRES_PASSWORD: kbagent
      POSTGRES_DB: kbagent
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres/pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbagent"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - ANTHROPIC_API_KEY
      - ANTHROPIC_AUTH_TOKEN
      - ANTHROPIC_BASE_URL
      - ANTHROPIC_MODEL
      - CLAUDE_CODE_USE_BEDROCK
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION
      - LOG_DIR=/app/logs
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./infra:/app/infra:ro
      - ./data/local_storage:/app/local_storage
      - ./data/logs:/app/logs

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
