services:
  init-dirs:
    image: alpine
    command: sh -c "mkdir -p /mnt/logs /mnt/documents /mnt/pgdata && chmod 777 /mnt/logs /mnt/documents"
    volumes:
      - ./data/logs:/mnt/logs
      - ./data/documents:/mnt/documents

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kbagent
      POSTGRES_PASSWORD: kbagent
      POSTGRES_DB: kbagent
    # 不对宿主暴露 5432：后端经 Docker 内网（hostname postgres）连接即可。
    # 如需 psql 调试，用：docker compose exec postgres psql -U kbagent
    volumes:
      - ./data/postgres/pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbagent"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      init-dirs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - ANTHROPIC_API_KEY
      - ANTHROPIC_AUTH_TOKEN
      - ANTHROPIC_BASE_URL
      - ANTHROPIC_MODEL
      - CLAUDE_CODE_USE_BEDROCK
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION
      - OPENAI_API_KEY
      - LOG_DIR=/app/logs
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./infra:/app/infra:ro
      - ./data/documents:/app/local_storage
      - ./data/logs:/app/logs
      - ./data/codex:/app/codex_config

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
